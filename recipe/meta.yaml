{% set version = "0.3.0" %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-ggchangepoint
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/ggchangepoint_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/ggchangepoint/ggchangepoint_{{ version }}.tar.gz
  sha256: 5384b999102d5d5ec384686a6137acd5bcba4a92dd89ba363638eaba7f390283

build:
  number: 0
  noarch: generic
  rpaths:
    - lib/R/lib/
    - lib/

requirements:
  build:
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
    - r-rdpack
    - r-changepoint
    - r-changepoint.np
    - r-dplyr
    - r-ecp
    - r-ggplot2
    - r-tibble
  run:
    - r-base
    - r-rdpack
    - r-changepoint
    - r-changepoint.np
    - r-dplyr
    - r-ecp
    - r-ggplot2
    - r-tibble

test:
  commands:
    - $R -e "library('ggchangepoint')"           # [not win]
    - "\"%R%\" -e \"library('ggchangepoint')\""  # [win]

about:
  home: https://CRAN.R-project.org/package=ggchangepoint
  license: GPL-3.0-or-later
  summary: R provides fantastic tools for changepoint analysis, but plots generated by the tools do not have the 'ggplot2' style. This tool, however, combines 'changepoint', 'changepoint.np' and 'ecp' together, and uses 'ggplot2' to visualize changepoints.
  license_family: GPL3
  license_file:
    - {{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-3

extra:
  recipe-maintainers:
    - conda-forge/r
